name: Setup Bun and install deps
description: Setup Bun and install deps

inputs:
  install-args:
    description: Extra args
    required: false
    default: ''
  working-directory:
    description: Directory to run install in
    required: false
    default: '.'

runs:
  using: composite
  steps:
    # needed for astro
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 22

    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: 1.3.14

    - name: Cache bun install
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory)) }}
        restore-keys: |
          bun-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INSTALL_ARGS: ${{ inputs.install-args }}
      # intentional unquoted expansion: word-split flags into separate args
      run: bun install --frozen-lockfile $INSTALL_ARGS
