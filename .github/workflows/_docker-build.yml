name: Docker Build

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      context:
        required: false
        type: string
        default: '.'
      platforms-matrix:
        description: |
          JSON array of {platform, runner} pairs
        required: false
        type: string
        # bun/uv support only amd64+arm64; rest can technically build elsewhere
        # but we default to the same pair everywhere. let us know if you need more platforms
        default: |
          [
            {"platform": "linux/amd64", "runner": "ubuntu-24.04"},
            {"platform": "linux/arm64", "runner": "ubuntu-24.04-arm"}
          ]
      push:
        description: Whether to push the built image to the registry
        required: false
        type: boolean
        default: true
      enabled:
        description: Whether to run at all
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    if: inputs.enabled
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.platforms-matrix) }}

    steps:
      - name: Compute artifact ids
        id: prep
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          IMAGE: ${{ inputs.image-name }}
        run: |
          echo "platform-pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
          echo "image-safe=${IMAGE//\//-}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        if: matrix.runner == 'ubuntu-24.04' && matrix.platform != 'linux/amd64'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ inputs.image-name }}

      - name: Build and push by digest
        if: inputs.push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ inputs.image-name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ inputs.image-name }}-${{ steps.prep.outputs.platform-pair }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image-name }}-${{ steps.prep.outputs.platform-pair }}
          provenance: mode=max
          sbom: true

      - name: Build (no push)
        if: ${{ !inputs.push }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=cacheonly
          cache-from: type=gha,scope=${{ inputs.image-name }}-${{ steps.prep.outputs.platform-pair }}

      - name: Export digest
        if: inputs.push
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        if: inputs.push
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # '--' separator so the image-safe prefix can't collide with another image
          name: digests-${{ steps.prep.outputs.image-safe }}--${{ steps.prep.outputs.platform-pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: inputs.enabled && inputs.push
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Compute artifact prefix
        id: prep
        shell: bash
        env:
          IMAGE: ${{ inputs.image-name }}
        run: |
          echo "image-safe=${IMAGE//\//-}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-${{ steps.prep.outputs.image-safe }}--*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ inputs.image-name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=ref,event=pr

      - name: Create manifest list and push
        id: push
        shell: bash
        working-directory: /tmp/digests
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ inputs.image-name }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE_REF}@sha256:%s " *)
          digest=$(docker buildx imagetools inspect "${IMAGE_REF}:${VERSION}" --format '{{.Manifest.Digest}}')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      # TODO(es3n1n): re-enable once the repo is public
      - name: Attest build provenance
        if: false
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ inputs.image-name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Inspect image
        shell: bash
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ inputs.image-name }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          docker buildx imagetools inspect "${IMAGE_REF}:${VERSION}"
