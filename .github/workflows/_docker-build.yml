name: Docker Build

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      context:
        required: false
        type: string
        default: '.'
      platforms-matrix:
        description: |
          JSON array of {platform, runner} pairs
        required: false
        type: string
        # bun/uv support only amd64+arm64; rest can technically build elsewhere
        # but we default to the same pair everywhere. let us know if you need more platforms
        default: |
          [
            {"platform": "linux/amd64", "runner": "ubuntu-24.04"},
            {"platform": "linux/arm64", "runner": "ubuntu-24.04-arm"}
          ]
      push:
        description: Whether to push the built image to the registry
        required: false
        type: boolean
        default: true
      enabled:
        description: Whether to run at all
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    if: inputs.enabled
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.platforms-matrix) }}

    steps:
      - name: Compute artifact ids
        id: prep
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          IMAGE: ${{ inputs.image-name }}
        run: |
          echo "platform-pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
          echo "image-safe=${IMAGE//\//-}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up QEMU
        if: matrix.runner == 'ubuntu-24.04' && matrix.platform != 'linux/amd64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ inputs.image-name }}

      - name: Build and push by digest
        if: inputs.push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ inputs.image-name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ inputs.image-name }}-${{ steps.prep.outputs.platform-pair }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image-name }}-${{ steps.prep.outputs.platform-pair }}

      - name: Build (no push)
        if: ${{ !inputs.push }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=cacheonly
          cache-from: type=gha,scope=${{ inputs.image-name }}-${{ steps.prep.outputs.platform-pair }}

      - name: Export digest
        if: inputs.push
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        if: inputs.push
        uses: actions/upload-artifact@v4
        with:
          # '--' separator so the image-safe prefix can't collide with another image
          name: digests-${{ steps.prep.outputs.image-safe }}--${{ steps.prep.outputs.platform-pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: inputs.enabled && inputs.push
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Compute artifact prefix
        id: prep
        shell: bash
        env:
          IMAGE: ${{ inputs.image-name }}
        run: |
          echo "image-safe=${IMAGE//\//-}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ steps.prep.outputs.image-safe }}--*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ inputs.image-name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr

      - name: Create manifest list and push
        shell: bash
        working-directory: /tmp/digests
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ inputs.image-name }}
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE_REF}@sha256:%s " *)

      - name: Inspect image
        shell: bash
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ inputs.image-name }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          docker buildx imagetools inspect "${IMAGE_REF}:${VERSION}"
