name: Test against v1

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-against-v1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-against-v1:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun-deps
        with:
          working-directory: tests/test-against-v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start services
        working-directory: tests/test-against-v1
        run: docker compose up --build -d

      - name: Run tests
        run: bun run test:against-v1

      - name: Show logs on failure
        if: failure()
        working-directory: tests/test-against-v1
        run: docker compose logs

      - name: Stop services
        if: always()
        working-directory: tests/test-against-v1
        run: docker compose down -v
