name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      admin-bot: ${{ steps.filter.outputs.admin-bot }}
      docker-instancer: ${{ steps.filter.outputs.docker-instancer }}
      k8s-operator: ${{ steps.filter.outputs.k8s-operator }}
      rctf: ${{ steps.filter.outputs.rctf }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # paths-filter needs github.event.before locally on push events
          fetch-depth: 0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            shared:
              - '.github/workflows/ci.yml'
              - '.github/workflows/_docker-build.yml'
              - '.github/workflows/_test.yml'
              - '.github/actions/setup-bun-deps/action.yml'
            admin-bot:
              - 'package.json'
              - 'bun.lock'
              - 'apps/admin-bot/**'
              - 'packages/**'
              - 'deploy/admin-bot/**'
            docker-instancer:
              - 'apps/docker-instancer/**'
              - 'deploy/docker-instancer/Dockerfile'
            k8s-operator:
              - 'apps/k8s-operator/**'
              - 'deploy/k8s-operator/Dockerfile'
            rctf:
              - 'package.json'
              - 'bun.lock'
              - 'apps/api/**'
              - 'apps/cli/**'
              - 'apps/web/**'
              - 'packages/**'
              - 'deploy/rctf/**'

  tests:
    uses: ./.github/workflows/_test.yml

  build:
    name: ${{ matrix.key }}
    needs: [changes, tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { key: admin-bot,        suffix: /admin-bot,        dockerfile: deploy/admin-bot/Dockerfile }
          - { key: docker-instancer, suffix: /docker-instancer, dockerfile: deploy/docker-instancer/Dockerfile }
          - { key: k8s-operator,     suffix: /k8s-operator,     dockerfile: deploy/k8s-operator/Dockerfile }
          - { key: rctf,             suffix: '',                dockerfile: deploy/rctf/Dockerfile }
    uses: ./.github/workflows/_docker-build.yml
    with:
      image-name: ${{ github.repository }}${{ matrix.suffix }}
      dockerfile: ${{ matrix.dockerfile }}
      push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      enabled: ${{ github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || ((github.event_name == 'push' || github.event_name == 'pull_request') && (needs.changes.outputs.shared == 'true' || needs.changes.outputs[matrix.key] == 'true')) }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
