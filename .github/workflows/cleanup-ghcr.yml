name: ghcr Cleanup

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'

permissions:
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: ghcr-cleanup
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-24.04
    outputs:
      valid: ${{ steps.collect.outputs.valid }}
    steps:
      - name: Collect current branches, git tags, and open PRs
        id: collect
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          sanitize() { sed 's|[^A-Za-z0-9_.+-]|-|g'; }

          tags=$(gh api "repos/${REPO}/tags" --paginate -q '.[].name')
          valid=$(
            {
              echo latest
              echo v1
              gh api "repos/${REPO}/branches" --paginate -q '.[].name' | sanitize
              printf '%s\n' "$tags" | sanitize
              printf '%s\n' "$tags" | sed -nE 's/^(v[0-9]+)\.([0-9]+)\.[0-9]+$/\1\n\1.\2/p'
              gh api "repos/${REPO}/pulls?state=open" --paginate -q '.[].number' | sed 's|^|pr-|'
            } | sed '/^$/d' | sort -u | paste -sd, -
          )
          echo "valid=$valid" >> "$GITHUB_OUTPUT"

  cleanup:
    needs: collect
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        package:
          - rctf
          - rctf/admin-bot
          - rctf/docker-instancer
          - rctf/k8s-operator
    steps:
      - name: Delete tags with no matching branch or git tag
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1.0.16
        with:
          package: ${{ matrix.package }}
          delete-tags: '*'
          exclude-tags: ${{ needs.collect.outputs.valid }}
          validate: true

      - name: Delete untagged orphans older than 2 weeks
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1.0.16
        with:
          package: ${{ matrix.package }}
          delete-untagged: true
          older-than: 2 weeks
          validate: true
