name: Build k8s-controller

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/k8s-controller.yaml"
      - ".github/workflows/admin-bot.yaml"
      - "apps/k8s-controller/**"
      - "deploy/k8s-controller/Dockerfile"

concurrency:
  group: k8s-controller-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    uses: ./.github/workflows/docker-build.yaml
    with:
      image-name: ${{ github.repository }}/k8s-controller
      dockerfile: deploy/k8s-controller/Dockerfile
      # technically all platforms can be used, but its very slow so only amd64 and arm64 are enabled
      platforms: linux/amd64,linux/arm64
    permissions:
      contents: read
      packages: write
    secrets: inherit
