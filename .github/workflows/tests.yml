name: Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run prettier -- --check

      - name: Typecheck
        run: bun run typecheck

      - name: Run server tests
        run: bun run test:server

      - name: Run admin-bot tests
        run: bun run test:admin-bot

      - name: Run admin-bot e2e tests
        run: bun run test:admin-bot:e2e
