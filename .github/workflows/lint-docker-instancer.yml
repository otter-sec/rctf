name: Lint docker-instancer

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/docker-instancer/**"
  pull_request:
    paths:
      - "apps/docker-instancer/**"

permissions:
  contents: read

concurrency:
  group: docker-instancer-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: apps/docker-instancer

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --locked

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run ty check instancer/
