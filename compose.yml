services:
  rctf:
    image: ghcr.io/otter-sec/rctf:${RCTF_GIT_REF}
    build:
      context: .
      dockerfile: deploy/rctf/Dockerfile
    restart: unless-stopped
    stop_grace_period: 45s
    ports:
      - '127.0.0.1:8080:80'
    networks:
      - rctf
      - db
    env_file:
      - .env
    volumes:
      - ./rctf.d:/app/rctf.d
      - ./.data/uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
  redis:
    image: redis:8.2.2
    restart: always
    networks:
      - db
    command: ['redis-server', '--requirepass', '${RCTF_REDIS_PASSWORD}']
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --pass ${RCTF_REDIS_PASSWORD} ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./.data/redis:/data
  postgres:
    image: postgres:18.0
    restart: always
    networks:
      - db
    environment:
      - POSTGRES_PASSWORD=${RCTF_DATABASE_PASSWORD}
      - POSTGRES_USER=rctf
      - POSTGRES_DB=rctf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rctf -d rctf"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./.data/postgres:/var/lib/postgresql/

networks:
  db:
  rctf:
    name: rctf_network
