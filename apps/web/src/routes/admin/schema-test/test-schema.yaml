type: object
properties:
  stringBasic:
    type: string
    title: "String: Basic Input"
    description: "A simple text input"
    default: "hello world"

  stringWithMinLength:
    type: string
    title: "String: Min Length (3)"
    description: "Must be at least 3 characters"
    minLength: 3

  stringWithMaxLength:
    type: string
    title: "String: Max Length (10)"
    description: "Must be at most 10 characters"
    maxLength: 10

  stringWithPattern:
    type: string
    title: "String: Pattern (email-like)"
    description: "Must match email pattern"
    pattern: "^[^@]+@[^@]+$"

  stringEmail:
    type: string
    title: "String: Email Format"
    description: "Uses ajv-formats email validation"
    format: email

  stringUri:
    type: string
    title: "String: URI Format"
    description: "Uses ajv-formats URI validation"
    format: uri

  stringTextarea:
    type: string
    title: "String: Textarea"
    description: "Uses textarea because maxLength > 100"
    maxLength: 500

  stringTextareaFormat:
    type: string
    title: "String: Textarea (format)"
    description: "Uses textarea because format is 'textarea'"
    format: textarea

  stringEnum:
    type: string
    title: "String: Enum Select"
    description: "Dropdown select from enum values"
    enum:
      - option-a
      - option-b
      - option-c
    default: option-a

  numberBasic:
    type: number
    title: "Number: Basic"
    description: "Accepts decimals, step is 'any'"
    default: 3.14

  numberWithRange:
    type: number
    title: "Number: With Min/Max"
    description: "Constrained to 0-100"
    minimum: 0
    maximum: 100

  integerBasic:
    type: integer
    title: "Integer: Basic"
    description: "Must be a whole number (try typing 3.5)"
    default: 42

  integerWithRange:
    type: integer
    title: "Integer: With Min/Max (1-10)"
    description: "Must be whole number between 1 and 10"
    minimum: 1
    maximum: 10

  booleanBasic:
    type: boolean
    title: "Boolean: Yes/No Select"
    description: "Renders as Yes/No dropdown"
    default: true

  arrayOfStrings:
    type: array
    title: "Array: String Tags"
    description: "Primitive array uses TagInput"
    items:
      type: string

  arrayOfNumbers:
    type: array
    title: "Array: Number Tags"
    description: "Numeric tags"
    items:
      type: integer

  arrayOfObjects:
    type: array
    title: "Array: Object Panel"
    description: "Complex items use panel UI with sidebar"
    items:
      type: object
      properties:
        name:
          type: string
          title: Name
        enabled:
          type: boolean
          title: Enabled
        priority:
          type: integer
          title: Priority

  recordStringValues:
    type: object
    title: "Record: String Values (Inline)"
    description: "Key=value pairs, simple inline UI"
    additionalProperties:
      type: string

  recordNumberValues:
    type: object
    title: "Record: Number Values (Inline)"
    description: "Key=number pairs"
    additionalProperties:
      type: integer

  recordBooleanValues:
    type: object
    title: "Record: Boolean Values (Inline)"
    description: "Key=boolean toggle pairs"
    additionalProperties:
      type: boolean

  recordObjectValues:
    type: object
    title: "Record: Object Values (Panel)"
    description: "Complex values use panel UI"
    additionalProperties:
      type: object
      properties:
        host:
          type: string
          title: Host
        port:
          type: integer
          title: Port
        secure:
          type: boolean
          title: Use TLS

  nestedObject:
    type: object
    title: "Nested Object"
    description: "Object with fixed properties renders as section"
    properties:
      database:
        type: object
        title: Database Settings
        properties:
          host:
            type: string
            title: Host
            default: localhost
          port:
            type: integer
            title: Port
            default: 5432
          ssl:
            type: boolean
            title: Enable SSL
      cache:
        type: object
        title: Cache Settings
        properties:
          enabled:
            type: boolean
            title: Enabled
          ttlSeconds:
            type: integer
            title: TTL (seconds)
            default: 3600
