# This rule is not used by the project rctf-instancer itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to rctf-instancer.osec.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: rctf-instancer
    app.kubernetes.io/managed-by: kustomize
  name: challengeinstance-viewer-role
rules:
- apiGroups:
  - rctf-instancer.osec.io
  resources:
  - challengeinstances
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - rctf-instancer.osec.io
  resources:
  - challengeinstances/status
  verbs:
  - get
