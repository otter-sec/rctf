# This rule is not used by the project rctf-instancer itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over rctf-instancer.osec.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: rctf-instancer
    app.kubernetes.io/managed-by: kustomize
  name: challengeinstance-admin-role
rules:
- apiGroups:
  - rctf-instancer.osec.io
  resources:
  - challengeinstances
  verbs:
  - '*'
- apiGroups:
  - rctf-instancer.osec.io
  resources:
  - challengeinstances/status
  verbs:
  - get
