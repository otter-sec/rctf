services:
  traefik:
    image: traefik:v3.6.8
    restart: unless-stopped
    container_name: ${TRAEFIK_CONTAINER_NAME:-ti-traefik}
    command:
      - --configFile=/etc/traefik/traefik.yml
    env_file:
      - .env
    networks:
      - tiny-network
    ports:
      - "${TRAEFIK_HTTPS_PORT:-443}:${TRAEFIK_HTTPS_PORT:-443}"
      - "${TRAEFIK_HTTP_PORT:-80}:${TRAEFIK_HTTP_PORT:-80}"
      - "${TRAEFIK_TCP_PORT:-1337}:${TRAEFIK_TCP_PORT:-1337}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./conf/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./conf/tls.yml:/etc/traefik/dynamic/tls.yml:ro
      - ./conf/middlewares.yml:/etc/traefik/dynamic/middlewares.yml:ro
      - ./certs/:/certs/:ro
  cache:
    image: redis:8.2.2
    restart: unless-stopped
    networks:
      - tiny-network
    env_file:
      - .env
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}']
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --pass ${REDIS_PASSWORD} ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./.data/redis:/data
  tiny-instancer:
    build:
      context: ../..
      dockerfile: deploy/docker-instancer/Dockerfile
    image: tiny-instancer:latest
    restart: unless-stopped
    container_name: tiny-instancer
    networks:
      rctf:
      tiny-network:
    depends_on:
      - traefik
      - cache
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      # Exposed to 127.0.0.1 only because rctf will reach it through a tiny-network network
      # If you're hosting tiny-instancer separately (which you should), expose this globally and make sure to put a firewall
      - "127.0.0.1:12237:1337"

networks:
  tiny-network:
  rctf:
    name: rctf_network
    external: true
