upstream rctf_api {
    server 127.0.0.1:3000;
    keepalive 16;
    # must stay below the API's Bun.serve idleTimeout
    keepalive_timeout 60s;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /app/static;
    gzip_static on;
    brotli_static on;

    # api responses are compressed here rather than in the API
    # so the JS thread doesn't spend its time gzipping
    gzip on;
    gzip_types application/json application/javascript text/javascript text/plain;
    gzip_min_length 1024;
    gzip_comp_level 4;
    gzip_vary on;
    gzip_proxied any;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # required for upstream keepalive
    proxy_set_header Connection "";
    proxy_http_version 1.1;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    include /etc/rctf/nginx/security-headers.conf;

    location ~ ^/api/v[12]/admin/upload$ {
        proxy_pass http://rctf_api;
        client_max_body_size 0;
        proxy_request_buffering off;
    }

    # TODO(trixter-osec): we should consider setting up caching for e.g. /api/v1/challs for resiliency (if challenges don't require auth)
    location ~ ^/(api|uploads) {
        proxy_pass http://rctf_api;
    }

    location /_app/immutable/ {
        # any add_header here suppresses inheritance of the server-level headers
        add_header Cache-Control "public, max-age=86400, immutable";
        include /etc/rctf/nginx/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
