services:
  admin-bot:
    build:
      context: ../..
      dockerfile: deploy/admin-bot/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:21337:21337"
    env_file:
      - .env
    volumes:
      - browser-cache:/data/browser-cache
    tmpfs:
      - /tmp:size=512M,mode=1777
      - /var/cache/fontconfig:size=64M,mode=1777
    shm_size: "512m"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - rctf_network

volumes:
  browser-cache:

networks:
  rctf_network:
    name: rctf_network
    external: true
